<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 725.9 568" width="725.9" height="568" style="--bg:#FFFFFF;--fg:#27272A;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 30%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="4.8" refX="8" refY="2.4" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.4, 0 4.8" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="4.8" refX="8" refY="2.4" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.4, 0 4.8" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<rect x="295.4" y="228" width="274.15" height="130" rx="0" ry="0" fill="none" stroke="var(--_node-stroke)" stroke-width="1" />
<rect x="295.4" y="228" width="143.6" height="18" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="301.4" y="237" dy="0.35em" font-size="11" font-weight="600" fill="var(--_text-sec)">opt [Account exists]</text>
<line x1="70" y1="70" x2="70" y2="538" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="210" y1="70" x2="210" y2="538" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="350" y1="70" x2="350" y2="538" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="497.075" y1="70" x2="497.075" y2="538" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="647.725" y1="70" x2="647.725" y2="538" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="70" y1="90" x2="210" y2="90" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="140" y="84" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">Submit email address</text>
<line x1="210" y1="130" x2="350" y2="130" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="280" y="124" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">POST /password-reset</text>
<polyline points="350,170 380,170 380,190 350,190" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="386" y="180" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">Validate request without revealing account existence</text>
<polyline points="350,268 380,268 380,288 350,288" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="386" y="278" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">Create reset token and store only its hash</text>
<line x1="350" y1="338" x2="497.075" y2="338" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="423.5375" y="332" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">Send reset link</text>
<line x1="350" y1="378" x2="647.725" y2="378" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="498.8625" y="372" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">Write security event</text>
<line x1="350" y1="418" x2="210" y2="418" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
<text x="280" y="412" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">Generic success response</text>
<line x1="70" y1="458" x2="210" y2="458" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="140" y="452" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">Open reset link and enter new password</text>
<line x1="210" y1="498" x2="350" y2="498" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="280" y="492" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">Submit new password with reset token</text>
<g transform="translate(52,32) scale(1.5)">
  <path d="M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" fill="none" stroke="var(--_line)" stroke-width="0.6666666666666666" />
  <path d="M15 10C15 11.6569 13.6569 13 12 13C10.3431 13 9 11.6569 9 10C9 8.34315 10.3431 7 12 7C13.6569 7 15 8.34315 15 10Z" fill="none" stroke="var(--_line)" stroke-width="0.6666666666666666" />
  <path d="M5.62842 18.3563C7.08963 17.0398 9.39997 16 12 16C14.6 16 16.9104 17.0398 18.3716 18.3563" fill="none" stroke="var(--_line)" stroke-width="0.6666666666666666" />
</g>
<text x="70" y="84" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)">User</text>
<rect x="168.975" y="30" width="82.05000000000001" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="210" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Web App</text>
<rect x="305.4" y="30" width="89.2" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="350" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Auth API</text>
<rect x="434.59999999999997" y="30" width="124.95" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="497.075" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Email Service</text>
<rect x="599.5500000000001" y="30" width="96.35000000000001" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="647.725" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Audit Log</text>
</svg>